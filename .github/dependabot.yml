version: 2

updates:
  # npm dependencies in package.json
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 10
    commit-message:
      prefix: "chore(deps)"
      include: "scope"
    # Pin minor/patch updates; leave major bumps for manual review.
    versioning-strategy: "increase"
    ignore:
      # @types/* churn constantly; review manually each release cycle.
      - dependency-name: "@types/*"
      # TypeScript major bumps require tsconfig + lib alignment.
      - dependency-name: "typescript"
    groups:
      # Group non-major devDependency bumps into a single PR.
      dev-dependencies:
        dependency-type: "development"
        update-types:
          - "minor"
          - "patch"
      # Group non-major production dependency bumps into a single PR.
      production-dependencies:
        dependency-type: "production"
        update-types:
          - "minor"
          - "patch"

  # GitHub Actions workflow versions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    commit-message:
      prefix: "chore(ci)"
      include: "scope"
