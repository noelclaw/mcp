name: 🐛 Bug Report
description: Report a bug to help us improve the MCP server
title: "[bug]: "
labels: ["bug", "triage"]
assignees: []
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug report! Please fill out the form below
        with as much detail as possible so we can reproduce and fix the issue.

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise description of what the bug is.
      placeholder: "What happened? What did you expect to happen?"
    validations:
      required: true

  - type: dropdown
    id: severity
    attributes:
      label: Severity
      description: How impactful is this bug?
      options:
        - critical
        - high
        - medium
        - low
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Steps to reproduce the behavior. Include code snippets or tool calls if possible.
      placeholder: |
        1. Start the MCP server with '...'
        2. Call the '...' tool with '...'
        3. See error
      value: |
        1.
        2.
        3.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened?
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Details about your runtime environment.
      placeholder: |
        - OS: (e.g. macOS 14, Ubuntu 22.04, Windows 11)
        - Node version: (run `node --version`)
        - MCP client: (e.g. Claude Desktop, Cursor, custom client)
        - @noelclaw/mcp version: (e.g. 3.29.0)
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs
      description: Relevant log output. Paste error messages, stack traces, or stderr output. (No credentials, please.)
      render: shell
    validations:
      required: false
