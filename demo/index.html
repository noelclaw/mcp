<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Noelclaw Demo</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  /* ── Design tokens - matches noelclaw.fun exactly ────────────────────────── */
  :root {
    /* light */
    --page-bg:      #f0eef9;
    --win-border:   #0a0a0a;
    --win-shadow:   #0a0a0a;
    --tb-bg:        #f5f5f5;
    --tb-border:    #e0e0e0;
    --tb-title:     #737373;
    --term-bg:      #ffffff;
    --term-border:  #e0e0e0;
    --c-fg:         #0d0d0d;
    --c-muted:      #737373;
    --c-prompt:     #059669;   /* emerald-600 */
    --c-primary:    #0066ff;   /* hsl(224 100% 50%) */
    --c-violet:     #7c3aed;
    --c-cursor:     #0d0d0d;
    --c-dim:        #b0b0b0;
    --c-divider:    #b0b0b0;
    --c-divider-ln: #e8e8e8;
    --c-tag-bg:     rgba(124,58,237,0.06);
    --c-tag-bd:     rgba(124,58,237,0.15);
    --c-tag-ft:     #555;
    --c-tag-em:     #7c3aed;
    --c-tag-sm:     #aaa;
    --toggle-bg:    rgba(0,0,0,0.06);
    --toggle-bd:    rgba(0,0,0,0.12);
    --toggle-c:     #555;
  }

  html.dark {
    /* dark - hsl(222 47% 6%) bg, hsl(222 47% 8%) card */
    --page-bg:      #080c1e;
    --win-border:   rgba(255,255,255,0.15);
    --win-shadow:   rgba(255,255,255,0.06);
    --tb-bg:        #1a2233;
    --tb-border:    #1f283d;
    --tb-title:     #64748b;
    --term-bg:      #0d1224;
    --term-border:  #1f283d;
    --c-fg:         #f4f7fa;
    --c-muted:      #94a3b8;
    --c-prompt:     #10b981;   /* emerald-500 */
    --c-primary:    #1a80ff;   /* hsl(224 100% 60%) */
    --c-violet:     #a78bfa;
    --c-cursor:     #f4f7fa;
    --c-dim:        #374151;
    --c-divider:    #374151;
    --c-divider-ln: #1f283d;
    --c-tag-bg:     rgba(167,139,250,0.06);
    --c-tag-bd:     rgba(167,139,250,0.15);
    --c-tag-ft:     #94a3b8;
    --c-tag-em:     #a78bfa;
    --c-tag-sm:     #4b5563;
    --toggle-bg:    rgba(255,255,255,0.06);
    --toggle-bd:    rgba(255,255,255,0.12);
    --toggle-c:     #94a3b8;
  }

  body {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background-color: var(--page-bg);
    font-family: 'JetBrains Mono', 'SF Mono', 'Geist Mono', 'Fira Code', Menlo, monospace;
    transition: background-color 0.35s ease;
    position: relative;
  }

  /* ── Theme toggle ────────────────────────────────────────────────────────── */
  .toggle {
    position: fixed;
    top: 18px; right: 18px;
    width: 34px; height: 34px;
    border-radius: 50%;
    border: 1px solid var(--toggle-bd);
    background: var(--toggle-bg);
    color: var(--toggle-c);
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 15px;
    backdrop-filter: blur(8px);
    transition: transform 0.15s, background 0.2s;
    z-index: 10;
  }
  .toggle:hover { transform: scale(1.08); }

  /* ── Window - sketch-card style ─────────────────────────────────────────── */
  .window {
    width: 700px;
    border-radius: 12px;
    overflow: hidden;
    border: 2px solid var(--win-border);
    box-shadow: 5px 5px 0px var(--win-shadow);
    transition: border-color 0.35s, box-shadow 0.35s;
  }

  /* ── Title bar ───────────────────────────────────────────────────────────── */
  .titlebar {
    background: var(--tb-bg);
    height: 40px;
    display: flex; align-items: center;
    padding: 0 16px;
    position: relative;
    border-bottom: 1px solid var(--tb-border);
    user-select: none;
    transition: background 0.35s, border-color 0.35s;
  }

  .buttons { display: flex; gap: 8px; position: absolute; left: 16px; }
  .btn { width: 12px; height: 12px; border-radius: 50%; }
  .close    { background: #FF5F57; }
  .minimize { background: #FFBD2E; }
  .maximize { background: #28C840; }

  .title {
    flex: 1; text-align: center;
    font-size: 11.5px; font-weight: 500;
    color: var(--tb-title);
    letter-spacing: 0.02em;
    transition: color 0.35s;
  }

  /* ── Terminal ────────────────────────────────────────────────────────────── */
  .terminal {
    background: var(--term-bg);
    padding: 22px 24px 26px;
    min-height: 370px;
    font-size: 13px;
    line-height: 1.75;
    color: var(--c-fg);
    transition: background 0.35s, color 0.35s;
  }

  /* ── Prompt line ─────────────────────────────────────────────────────────── */
  .line   { display: flex; align-items: baseline; white-space: pre; }
  .p-sym  { color: var(--c-prompt); font-weight: 700; }
  .p-sp   { color: var(--c-fg); }

  /* ── Tokens ──────────────────────────────────────────────────────────────── */
  .t-cmd   { color: var(--c-fg); }
  .t-flag  { color: #d97706; }          /* amber-600 in light, close enough */
  .t-value { color: #db2777; }          /* pink-600 */

  html.dark .t-flag  { color: #fbbf24; }  /* amber-400 */
  html.dark .t-value { color: #f472b6; }  /* pink-400 */

  /* ── Output ──────────────────────────────────────────────────────────────── */
  .output  { color: var(--c-muted); padding-left: 1px; white-space: pre; }
  .k-label { color: var(--c-dim); }
  .k-value { color: var(--c-fg); opacity: 0.8; }
  .k-ok    { color: var(--c-prompt); }
  .k-blue  { color: var(--c-primary); }
  .k-vi    { color: var(--c-violet); font-weight: 600; }
  .k-dim   { color: var(--c-dim); }

  /* ── Cursor ──────────────────────────────────────────────────────────────── */
  .cursor {
    display: inline-block;
    width: 2px; height: 14px;
    background: var(--c-fg);
    margin-left: 1px;
    vertical-align: -2px;
    border-radius: 1px;
    animation: blink 1.1s step-end infinite;
    opacity: 0.7;
  }
  @keyframes blink { 50% { opacity: 0; } }

  /* ── Divider ─────────────────────────────────────────────────────────────── */
  .divider {
    display: flex; align-items: center; gap: 10px;
    margin: 12px 0 10px;
    color: var(--c-divider);
    font-size: 10.5px; letter-spacing: 0.12em; text-transform: uppercase;
    transition: color 0.35s;
  }
  .divider::before, .divider::after {
    content: ''; flex: 1; height: 1px;
    background: var(--c-divider-ln);
    transition: background 0.35s;
  }

  /* ── Tagline ─────────────────────────────────────────────────────────────── */
  .tagline {
    margin-top: 16px;
    padding: 12px 14px;
    border-radius: 10px;
    background: var(--c-tag-bg);
    border: 1px solid var(--c-tag-bd);
    font-size: 12.5px;
    color: var(--c-tag-ft);
    opacity: 0;
    transform: translateY(5px);
    transition: opacity 0.7s ease, transform 0.7s ease,
                background 0.35s, border-color 0.35s, color 0.35s;
    line-height: 1.5;
  }
  .tagline em   { color: var(--c-tag-em); font-style: normal; font-weight: 600; }
  .tagline span { color: var(--c-tag-sm); font-size: 11px; display: block; margin-top: 4px; }
  .tagline.show { opacity: 1; transform: translateY(0); }
</style>
</head>
<body>

<button class="toggle" id="themeBtn" title="Toggle theme">☀️</button>

<div class="window">
  <div class="titlebar">
    <div class="buttons">
      <span class="btn close"></span>
      <span class="btn minimize"></span>
      <span class="btn maximize"></span>
    </div>
    <span class="title">noelclaw - ai session</span>
  </div>
  <div class="terminal" id="t"></div>
</div>

<script>
// ── Theme ─────────────────────────────────────────────────────────────────────
const html = document.documentElement
const btn  = document.getElementById('themeBtn')

function getInitialTheme() {
  const p = new URLSearchParams(location.search).get('theme')
  if (p === 'light' || p === 'dark') return p
  return window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light'
}

let theme = getInitialTheme()

function applyTheme(t) {
  theme = t
  html.classList.toggle('dark', t === 'dark')
  btn.textContent = t === 'dark' ? '☀️' : '🌙'
}

btn.addEventListener('click', () => applyTheme(theme === 'dark' ? 'light' : 'dark'))
window.addEventListener('message', e => {
  if (e.data?.theme === 'light' || e.data?.theme === 'dark') applyTheme(e.data.theme)
})
applyTheme(theme)

// ── Engine ────────────────────────────────────────────────────────────────────
const T     = document.getElementById('t')
const el    = (tag, cls, html) => { const e = document.createElement(tag); if (cls) e.className = cls; if (html != null) e.innerHTML = html; return e }
const sleep = ms => new Promise(r => setTimeout(r, ms))

function mkPrompt() {
  const line = el('div', 'line')
  line.innerHTML = `<span class="p-sym">&gt;</span><span class="p-sp"> </span>`
  return line
}

function tokenize(text) {
  const tokens = []
  let first = true
  for (const p of text.split(/( +)/)) {
    if (!p) continue
    if (/^ +$/.test(p)) { tokens.push({ cls: 't-cmd', text: p }); continue }
    if (first) { tokens.push({ cls: 't-cmd', text: p }); first = false; continue }
    const eq = p.indexOf('=')
    if (eq > 0 && /^[a-zA-Z_]/.test(p)) {
      tokens.push({ cls: 't-flag',  text: p.slice(0, eq + 1) })
      tokens.push({ cls: 't-value', text: p.slice(eq + 1) })
    } else {
      tokens.push({ cls: 't-flag', text: p })
    }
  }
  return tokens
}

async function typeCmd(line, text, speed = 44) {
  for (const tok of tokenize(text)) {
    const s = el('span', tok.cls)
    line.appendChild(s)
    for (const ch of tok.text) {
      s.textContent += ch
      await sleep(speed + Math.random() * 20 - 10)
    }
  }
}

const out   = (html, cls = 'output') => { const d = el('div', cls, html); T.appendChild(d); return d }
const blank = () => out('')
const row   = (label, value, valCls = 'k-value') =>
  out(`  <span class="k-label">${label.padEnd(8)}</span>  <span class="${valCls}">${value}</span>`)

async function enter(line) {
  const c = el('span', 'cursor'); line.appendChild(c)
  await sleep(220); c.remove(); await sleep(580)
}

// ── Demo ──────────────────────────────────────────────────────────────────────
async function run() {
  T.innerHTML = ''
  await sleep(600)

  // ── Prompt 1 - idle ───────────────────────────────────────────────────────
  const p1 = mkPrompt()
  const c1 = el('span', 'cursor'); p1.appendChild(c1); T.appendChild(p1)
  await sleep(1400); c1.remove()

  await typeCmd(p1, 'agent_spawn name="market-researcher" goal="track AI infrastructure weekly"')
  await enter(p1)

  blank()
  out('🤖  <span class="k-ok" style="font-weight:600">Agent spawned.</span>')
  blank()
  await sleep(70)
  row('Name',   'market-researcher')
  await sleep(55)
  row('Goal',   'track AI infrastructure weekly')
  await sleep(55)
  row('Status', '● active', 'k-ok')
  blank()
  await sleep(70)
  out('  <span class="k-dim">Recall anytime ›</span>  <span class="k-blue">agent_recall name="market-researcher"</span>')
  blank()

  await sleep(2300)

  // ── Divider ───────────────────────────────────────────────────────────────
  const div = el('div', 'divider'); div.textContent = '2 days later'; T.appendChild(div)
  await sleep(850)

  // ── Prompt 2 ──────────────────────────────────────────────────────────────
  const p2 = mkPrompt()
  const c2 = el('span', 'cursor'); p2.appendChild(c2); T.appendChild(p2)
  await sleep(1050); c2.remove()

  await typeCmd(p2, 'agent_recall name="market-researcher"')
  await enter(p2)

  blank()
  out('<span class="k-vi">## Agent: market-researcher</span>')
  blank()
  await sleep(80)
  row('Goal',    'track AI infrastructure weekly')
  await sleep(60)
  row('Status',  '● active', 'k-ok')
  await sleep(60)
  row('Version', 'v1')
  await sleep(60)
  row('Spawned', '2 days ago', 'k-dim')
  blank()

  await sleep(1600)

  // ── Idle prompt ───────────────────────────────────────────────────────────
  const p3 = mkPrompt()
  const c3 = el('span', 'cursor'); p3.appendChild(c3); T.appendChild(p3)
  await sleep(1300)

  // ── Tagline ───────────────────────────────────────────────────────────────
  const tl = el('div', 'tagline')
  tl.innerHTML =
    `Your AI agents <em>remember everything</em> - even after you close the window.` +
    `<span>noelclaw.com &nbsp;·&nbsp; npx -y @noelclaw/mcp</span>`
  T.appendChild(tl)
  await sleep(60); tl.classList.add('show')

  await sleep(4600)
  await run()
}

run()
</script>
</body>
</html>
